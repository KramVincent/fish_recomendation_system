services:
  - type: web
    name: fish-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements-render.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: UPLOADS_DIR
        value: /tmp/uploads
      - key: MODEL_DIR
        value: /opt/render/project/src/backend/models
      - key: PYTHON_VERSION
        value: 3.11.9
